    x="440"
    y="85"
    font-family="'Courier New', Courier, monospace"
    font-size="36"
    font-weight="bold"
    fill="#e8c47a"
    letter-spacing="2"
  >web3-news-push</text>

  <text
    x="442"
    y="115"
    font-family="'Courier New', Courier, monospace"
    font-size="13"
    fill="#888888"
    letter-spacing="1"
  >每日加密货币新闻  ·  AI 中文摘要  ·  Telegram 推送</text>

