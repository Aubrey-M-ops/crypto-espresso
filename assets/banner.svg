  <!-- Steam particles -->
  <!-- Left steam -->
  <rect x="288" y="32" width="8" height="8" fill="#888"/>
  <rect x="280" y="24" width="8" height="8" fill="#666"/>
  <rect x="288" y="16" width="8" height="8" fill="#444"/>
